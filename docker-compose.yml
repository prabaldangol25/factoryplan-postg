services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: factoryplan
    ports:
      - "5433:5432"
    volumes:
      - factoryplan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d factoryplan"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      RUST_LOG: info
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/factoryplan
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  factoryplan_pgdata:
